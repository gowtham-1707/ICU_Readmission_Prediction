# ── MLflow ────────────────────────────────────────────────────
mlflow:
  experiment_name: "icu-readmission"
  tracking_uri: "http://localhost:5000"  

# ── Data ──────────────────────────────────────────────────────
data:
  random_state: 42
  test_size: 0.2
  n_splits: 5
  chunk_size: 500000
  readmission_window_days: 30

# ── Preprocessing ─────────────────────────────────────────────
preprocessing:
  mice_max_iter: 10
  mice_random_state: 42
  drop_missing_threshold: 0.5

# ── Baseline Models ───────────────────────────────────────────
baseline:
  logistic_regression:
    penalty: null
    solver: lbfgs
    max_iter: 1000
    class_weight: balanced

  lasso:
    Cs: 10
    penalty: l1
    solver: saga
    max_iter: 2000
    scoring: roc_auc

  ridge:
    Cs: 10
    penalty: l2
    solver: lbfgs
    max_iter: 1000
    scoring: roc_auc

# ── ML Models ─────────────────────────────────────────────────
ml:
  random_forest:
    n_estimators: 300
    max_depth: 10
    min_samples_leaf: 20
    max_features: sqrt
    class_weight: balanced
    n_jobs: -1
    random_state: 42

  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 6
    eval_metric: auc
    random_state: 42

  mlp:
    hidden_layer_sizes: [128, 64, 32]
    activation: relu
    batch_size: 256
    max_epochs: 50
    learning_rate: 0.001
    early_stopping_patience: 5
    random_state: 42

# ── Evaluation ────────────────────────────────────────────────
evaluation:
  n_bootstrap: 1000
  bootstrap_seed: 42
  threshold_default: 0.5
  threshold_clinical: 0.167

# ── SHAP ──────────────────────────────────────────────────────
shap:
  max_display: 20
  n_samples: 500
  best_model: xgboost